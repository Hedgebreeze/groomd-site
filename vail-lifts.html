<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Vail Lift Wait Times — Live | Groomd</title>

  <meta name="description" content="Real-time Vail ski lift wait times and status. See which lifts are open and current wait times, updated every 10 minutes.">
  <meta property="og:title" content="Vail Lift Wait Times — Live | Groomd">
  <meta property="og:description" content="Real-time Vail ski lift wait times and status. Updated every 10 minutes.">
  <meta property="og:image" content="assets/groomd_icon.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://groomd.app/vail-lifts.html">
  <link rel="canonical" href="https://groomd.app/vail-lifts.html">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0c1a2b">
  <link rel="icon" type="image/png" href="assets/groomd_icon.png">
  <link rel="apple-touch-icon" href="assets/groomd_icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1MB90ZZJ7V"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-1MB90ZZJ7V');
  </script>

  <style>
    :root {
      --bg: #0a0e17;
      --board-bg: #0c1a2b;
      --board-border: #3d2b1a;
      --board-border-light: #6b4c2a;
      --text: #e9f1ff;
      --muted: #6b7f99;
      --green: #7bffc3;
      --yellow: #ffcc66;
      --red: #ff8f87;
      --cyan: #7bd8ff;
      --bar-bg: rgba(15, 23, 42, 0.95);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "JetBrains Mono", "SF Mono", "Fira Code", "Cascadia Code", monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-text-size-adjust: none;
    }

    /* ── Sticky top bar ── */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bar-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-bar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
    }
    .top-bar-logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }
    .top-bar-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .top-bar-spacer { flex: 1; }
    .top-bar-cta { flex-shrink: 0; }
    .top-bar-cta img { height: 32px; display: block; }

    /* ── Board frame ── */
    .board-wrapper {
      max-width: 720px;
      margin: 20px auto;
      padding: 0 12px;
    }
    .board {
      border: 3px solid var(--board-border);
      border-radius: 8px;
      background: var(--board-bg);
      box-shadow:
        0 0 0 1px var(--board-border-light),
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.03);
      overflow: hidden;
      position: relative;
    }

    /* ── Sign header ── */
    .sign-header {
      text-align: center;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sign-title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .sign-marker {
      width: 22px;
      height: 22px;
      border: 2px solid var(--board-border-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--board-border-light);
      flex-shrink: 0;
    }
    .sign-marker::after { content: '+'; font-weight: 700; }
    .sign-line {
      flex: 1;
      max-width: 60px;
      height: 1px;
      background: var(--board-border-light);
    }
    .sign-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Summary bar ── */
    .summary {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 16px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .summary-count .num { color: var(--text); font-weight: 700; }
    .summary-time .fresh { color: var(--green); }
    .summary-time .stale { color: var(--yellow); }
    .summary-time .old { color: var(--red); }

    /* ── Lift grid ── */
    .lift-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 4px 0;
    }
    .lift-row {
      display: flex;
      align-items: baseline;
      padding: 3px 16px;
      font-size: 13px;
      min-height: 28px;
      gap: 6px;
    }
    .lift-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }
    .lift-row.closed .lift-name { color: var(--muted); }
    .lift-wait {
      font-weight: 700;
      flex-shrink: 0;
      text-align: right;
      min-width: 40px;
    }
    .lift-wait.green { color: var(--green); }
    .lift-wait.yellow { color: var(--yellow); }
    .lift-wait.red { color: var(--red); }
    .lift-wait.muted { color: var(--muted); font-weight: 400; font-size: 11px; }

    /* ── Blurred overflow section ── */
    .blur-wrapper {
      position: relative;
    }
    .blur-lifts {
      filter: blur(5px);
      -webkit-filter: blur(5px);
      opacity: 0.5;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .blur-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(12, 26, 43, 0.6) 40%,
        rgba(12, 26, 43, 0.95) 100%
      );
      pointer-events: none;
    }

    /* ── Half-sheet CTA ── */
    .half-sheet {
      position: relative;
      z-index: 10;
      margin: -30px 16px 16px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #0f243a 0%, #162d4a 100%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
    }
    .half-sheet-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 10px;
    }
    .half-sheet-count {
      font-size: 15px;
      font-weight: 800;
      color: var(--cyan);
      letter-spacing: 0.02em;
    }
    .half-sheet-features {
      display: flex;
      gap: 12px;
      font-size: 10px;
      color: var(--muted);
    }
    .half-sheet-feat { white-space: nowrap; }
    .half-sheet-feat .ico { color: var(--green); }
    .half-sheet-btn {
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .half-sheet-btn:hover { transform: scale(1.05); }
    .half-sheet-btn img { height: 36px; }

    /* ── Page footer ── */
    .page-footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 12px;
      color: var(--muted);
    }
    .page-footer a { color: var(--muted); text-decoration: none; }
    .page-footer a:hover { text-decoration: underline; }
    .page-footer .sep { margin: 0 6px; }

    /* ── Loading / error states ── */
    .board-msg {
      padding: 40px 16px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .board-msg.error { color: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .loading { animation: pulse 1.5s ease-in-out infinite; }

    /* ── Responsive ── */
    @media (max-width: 599px) {
      .lift-grid { grid-template-columns: 1fr; }
      .board-wrapper { padding: 0 8px; margin: 12px auto; }
      .sign-title { font-size: 17px; }
      .lift-row { font-size: 12px; padding: 3px 12px; }
      .summary { padding: 8px 12px; }
      .half-sheet { margin: -24px 8px 12px; padding: 12px; }
      .half-sheet-top { flex-direction: column; gap: 6px; }
      .half-sheet-features { flex-wrap: wrap; justify-content: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- Sticky top bar -->
  <div class="top-bar">
    <a href="/" class="top-bar-brand">
      <img src="assets/groomd_icon.png" alt="Groomd" class="top-bar-logo">
      <span class="top-bar-title">VAIL LIFT STATUS</span>
    </a>
    <span class="top-bar-spacer"></span>
    <a href="https://apps.apple.com/us/app/groomd-ski-mountain-reports/id6756031302" class="top-bar-cta" aria-label="Download on the App Store">
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
    </a>
  </div>

  <!-- Board -->
  <div class="board-wrapper">
    <div class="board">
      <div class="sign-header">
        <div class="sign-title-row">
          <span class="sign-marker"></span>
          <span class="sign-line"></span>
          <span class="sign-title">Lift Status</span>
          <span class="sign-line"></span>
          <span class="sign-marker"></span>
        </div>
      </div>

      <div class="summary" id="summary">
        <span class="summary-count"><span class="num">--</span>/<span class="num">--</span> LIFTS OPEN</span>
        <span class="summary-time" id="summary-time">--</span>
      </div>

      <div id="lift-container">
        <div class="board-msg loading">LOADING...</div>
      </div>
    </div>

    <!-- Half-sheet CTA (injected by JS after blur) -->
    <div class="half-sheet" id="half-sheet" style="display: none;">
      <div class="half-sheet-top">
        <span class="half-sheet-count">More Lifts in the Free App</span>
      </div>
      <a href="https://apps.apple.com/us/app/groomd-ski-mountain-reports/id6756031302" class="half-sheet-btn" aria-label="Download on the App Store">
        <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
      </a>
    </div>
  </div>

  <!-- Page footer -->
  <footer class="page-footer">
    <a href="/">Home</a>
    <span class="sep">&middot;</span>
    <a href="privacy.html">Privacy</a>
    <span class="sep">&middot;</span>
    <a href="support.html">Support</a>
    <span class="sep">&middot;</span>
    <span>&copy; 2025-2026 Groomd</span>
  </footer>

  <script>
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // CONVERSION OPTIMIZATION CONFIG
    // Toggle these settings to control what's shown vs. gated
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const CONFIG = {
      API_URL: 'https://groomd-api.groomd.workers.dev/vail/lifts',

      REFRESH_MS: 60000,

      // Number of open lifts to show clearly (rest are blurred)
      VISIBLE_LIFTS: 5,

      // Number of blurred "teaser" rows to show below the cutoff
      BLURRED_ROWS: 6,

      // Show wait times (false = show "OPEN" only)
      SHOW_WAIT_TIMES: true,

      // Two-column layout on desktop
      TWO_COLUMN: true,

      APP_STORE_URL: 'https://apps.apple.com/us/app/groomd-ski-mountain-reports/id6756031302',
    };

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    let lastGenerated = null;
    let refreshTimer = null;
    let tickTimer = null;

    const $ = id => document.getElementById(id);

    function timeAgo(iso) {
      if (!iso) return '--';
      const ms = Date.now() - new Date(iso).getTime();
      const m = Math.max(0, Math.round(ms / 60000));
      if (m < 1) return 'JUST NOW';
      if (m === 1) return '1 MIN AGO';
      if (m < 60) return m + ' MINS AGO';
      const h = Math.floor(m / 60);
      return h === 1 ? '1 HR AGO' : h + ' HRS AGO';
    }

    function freshness(iso) {
      if (!iso) return '';
      const m = Math.round((Date.now() - new Date(iso).getTime()) / 60000);
      if (m <= 5) return 'fresh';
      if (m <= 15) return 'stale';
      return 'old';
    }

    function updateTimestamp() {
      const el = $('summary-time');
      if (!lastGenerated) { el.textContent = '--'; return; }
      const cls = freshness(lastGenerated);
      const text = timeAgo(lastGenerated);
      el.innerHTML = `<span class="${cls}">${text}</span>`;
    }

    function waitColor(mins) {
      if (mins === null || mins === undefined) return 'muted';
      if (mins <= 3) return 'green';
      if (mins <= 7) return 'yellow';
      return 'red';
    }

    function waitText(mins) {
      if (!CONFIG.SHOW_WAIT_TIMES) return '<span class="lift-wait green">OPEN</span>';
      if (mins === null || mins === undefined || mins === 0) return '<span class="lift-wait green">OPEN</span>';
      return `<span class="lift-wait ${waitColor(mins)}">${mins}M</span>`;
    }

    function liftRowHtml(lift, extraClass) {
      const cls = extraClass ? ` ${extraClass}` : '';
      return `<div class="lift-row${cls}">
        <span class="lift-name">${lift.name}</span>
        ${waitText(lift.waitMinutes)}
      </div>`;
    }

    function renderLifts(data) {
      const container = $('lift-container');
      const lifts = data.lifts || [];

      const open = lifts
        .filter(l => l.status?.toLowerCase() === 'open')
        .sort((a, b) => (b.waitMinutes ?? -1) - (a.waitMinutes ?? -1));

      const closed = lifts.filter(l => l.status?.toLowerCase() !== 'open');
      const totalOther = open.length - CONFIG.VISIBLE_LIFTS + closed.length;

      // Update summary
      $('summary').querySelector('.summary-count').innerHTML =
        `<span class="num">${open.length}</span>/<span class="num">${lifts.length}</span> LIFTS OPEN`;

      lastGenerated = data.generated;
      updateTimestamp();

      const gridClass = CONFIG.TWO_COLUMN ? 'lift-grid' : 'lift-grid single-col';

      // --- Visible lifts ---
      const visible = open.slice(0, CONFIG.VISIBLE_LIFTS);
      let html = `<div class="${gridClass}">`;
      for (const lift of visible) {
        html += liftRowHtml(lift);
      }
      html += '</div>';

      // --- Blurred teaser lifts ---
      const remaining = open.slice(CONFIG.VISIBLE_LIFTS);
      const teaserLifts = remaining.slice(0, CONFIG.BLURRED_ROWS);

      // If there are no teaser lifts (e.g. nighttime / few open), show closed as teasers
      const teasers = teaserLifts.length > 0
        ? teaserLifts
        : closed.slice(0, CONFIG.BLURRED_ROWS);

      if (teasers.length > 0) {
        html += '<div class="blur-wrapper">';
        html += `<div class="blur-lifts"><div class="${gridClass}">`;
        for (const lift of teasers) {
          const isOpen = lift.status?.toLowerCase() === 'open';
          html += isOpen ? liftRowHtml(lift) : `<div class="lift-row closed">
            <span class="lift-name">${lift.name}</span>
            <span class="lift-wait muted">CLOSED</span>
          </div>`;
        }
        html += '</div></div>';
        html += '<div class="blur-fade"></div>';
        html += '</div>';
      }

      container.innerHTML = html;

      // --- Show half-sheet CTA ---
      const sheet = $('half-sheet');
      sheet.style.display = '';
    }

    async function fetchData() {
      try {
        const url = CONFIG.API_URL + (CONFIG.API_URL.includes('?') ? '&' : '?') + '_t=' + Date.now();
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderLifts(data);
      } catch (err) {
        console.error('Fetch error:', err);
        const container = $('lift-container');
        if (container.querySelector('.loading')) {
          container.innerHTML = '<div class="board-msg error">UNABLE TO REACH MOUNTAIN</div>';
        }
      }
    }

    function startRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(fetchData, CONFIG.REFRESH_MS);
    }

    function startTick() {
      if (tickTimer) clearInterval(tickTimer);
      tickTimer = setInterval(updateTimestamp, 15000);
    }

    fetchData().then(() => {
      startRefresh();
      startTick();
    });
  </script>
</body>
</html>
